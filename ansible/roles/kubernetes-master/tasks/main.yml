- name: Ensure swap is off before starting control plane
  ansible.builtin.command: swapoff -a
  tags:
    - kubernetes-master
    - control-plane
    - kubeadm
    - swap

- name: Copy kubeadm config
  ansible.builtin.template:
    src: kubeadm-config.yaml.j2
    dest: /tmp/kubeadm-config.yaml
    mode: '0440'
  tags:
    - kubernetes-master
    - control-plane
    - kubeadm

- name: Check if cluster already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf
  tags:
    - kubernetes-master
    - control-plane
    - kubeadm

- name: Reset kubeadm
  command: /usr/bin/kubeadm reset -f
  when: force_cluster_reset | bool
  tags:
    - kubernetes-master
    - control-plane
    - kubeadm
    - reset

- name: Init kubeadm
  command: /usr/bin/kubeadm init --config /tmp/kubeadm-config.yaml --ignore-preflight-errors=all
  when: not kubeadm_admin_conf.stat.exists or force_cluster_reset | bool
  tags:
    - kubernetes-master
    - control-plane
    - kubeadm

- name: create folder .kube
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: '0755'
  tags:
    - kubernetes-master
    - control-plane
    - kubeconfig

- name: Copy kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /root/.kube/config
    remote_src: true
    mode: '0440'
  tags:
    - kubernetes-master
    - control-plane
    - kubeconfig

- name: Wait for Kubernetes API port
  ansible.builtin.wait_for:
    host: "{{ inventory_hostname }}"
    port: "{{ kubeadm_bind_port }}"
    state: started
    timeout: 300
  tags:
    - kubernetes-master
    - control-plane
    - kubeadm
    - kubeconfig

- name: Wait for Kubernetes API readiness
  ansible.builtin.command: kubectl cluster-info
  register: kubernetes_api_readiness
  changed_when: false
  retries: 30
  delay: 10
  until: kubernetes_api_readiness.rc == 0
  tags:
    - kubernetes-master
    - control-plane
    - kubeadm
    - kubeconfig

- name: Read admin kubeconfig
  ansible.builtin.slurp:
    src: /etc/kubernetes/admin.conf
  register: kubeconfig_admin_conf
  no_log: true
  when: kubeconfig_local_update | bool
  tags:
    - kubernetes-master
    - control-plane
    - kubeconfig

- name: Create local kubeconfig directory
  ansible.builtin.file:
    path: "{{ kubeconfig_local_path | dirname }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false
  when: kubeconfig_local_update | bool
  tags:
    - kubernetes-master
    - control-plane
    - kubeconfig

- name: Replace local kubeconfig
  ansible.builtin.copy:
    content: "{{ kubeconfig_admin_conf.content | b64decode }}"
    dest: "{{ kubeconfig_local_path }}"
    mode: '0600'
  delegate_to: localhost
  become: false
  no_log: true
  when: kubeconfig_local_update | bool
  tags:
    - kubernetes-master
    - control-plane
    - kubeconfig

- name: Install CNI plugin
  command: "kubectl apply -f https://github.com/flannel-io/flannel/releases/download/{{ flannel_version }}/kube-flannel.yml"
  register: flannel_apply
  retries: 12
  delay: 10
  until: flannel_apply.rc == 0
  tags:
    - kubernetes-master
    - cni
    - flannel

- name: Force Flannel to use the Vagrant private network interface
  command: >-
    kubectl patch daemonset kube-flannel-ds -n kube-flannel --type=strategic -p
    '{"spec":{"template":{"spec":{"containers":[{"name":"kube-flannel","args":["--ip-masq","--kube-subnet-mgr","--iface={{ flannel_iface }}"]}]}}}}'
  register: flannel_iface_patch
  changed_when: "'no change' not in flannel_iface_patch.stdout"
  retries: 12
  delay: 10
  until: flannel_iface_patch.rc == 0
  run_once: true
  tags:
    - kubernetes-master
    - cni
    - flannel

- name: Install metrics-server
  command: "kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/download/{{ metrics_server_version }}/components.yaml"
  register: metrics_server_apply
  retries: 12
  delay: 10
  until: metrics_server_apply.rc == 0
  run_once: true
  tags:
    - kubernetes-master
    - metrics-server

# kubeadm génère des certs kubelet auto-signés que metrics-server ne
# valide pas par défaut ; --kubelet-insecure-tls désactive cette
# vérification (acceptable en lab, à éviter en prod).
- name: Allow metrics-server to trust kubeadm self-signed kubelet certs
  command: >-
    kubectl patch deployment metrics-server -n kube-system --type=strategic -p
    '{"spec":{"template":{"spec":{"containers":[{"name":"metrics-server","args":["--cert-dir=/tmp","--secure-port=10250","--kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname","--kubelet-use-node-status-port","--metric-resolution=15s","--kubelet-insecure-tls"]}]}}}}'
  register: metrics_server_patch
  changed_when: "'no change' not in metrics_server_patch.stdout"
  retries: 12
  delay: 10
  until: metrics_server_patch.rc == 0
  run_once: true
  tags:
    - kubernetes-master
    - metrics-server

- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_command
  run_once: true
  tags:
    - kubernetes-master
    - control-plane
    - join-command
