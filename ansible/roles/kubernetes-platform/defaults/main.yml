---
# gateway_api_version, metallb_chart_version, metallb_addresses et
# traefik_chart_version sont declares dans group_vars/all.yml (source de
# verite synchronisee avec cockpit/platform.yml) : ne pas les
# redeclarer ici, group_vars a de toute facon une precedence plus haute que
# les defaults de role et masquerait silencieusement toute modification
# faite ici.
helm_version: "3.18.6"
helm_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'amd64' }}"
helm_binary_path: /usr/local/bin/helm

local_path_provisioner_version: "v0.0.31"
local_path_provisioner_namespace: local-path-storage
local_path_storage_class_name: local-path

metallb_namespace: metallb-system
metallb_pool_name: vagrant-pool
metallb_l2_advertisement_name: vagrant-l2

traefik_namespace: traefik
traefik_dashboard_host: dashboard.localhost

traefik_gateway_name: traefik-gateway
traefik_gateway_namespace: default
traefik_gateway_listener_port: 8000
traefik_gateway_tls_listener_port: 8443
traefik_gateway_tls_secret_name: nip-io-wildcard-tls

# cert_manager_chart_version est declare dans group_vars/all.yml, meme regle
# que pour les autres versions de charts (voir commentaire en tete de fichier).
cert_manager_namespace: cert-manager

# CA interne auto-signee : un Issuer self-signed bootstrap une Certificate CA,
# et un ClusterIssuer de type `ca` s'appuie dessus pour signer les
# certificats applicatifs (ici, le wildcard de la Gateway partagee). Pas de
# Let's Encrypt/ACME possible ici : le cluster n'a ni domaine public ni
# exposition Internet (IP privee + noms nip.io).
cert_manager_selfsigned_issuer_name: poc-lab-selfsigned-issuer
cert_manager_ca_certificate_name: poc-lab-ca
cert_manager_ca_secret_name: poc-lab-ca
cert_manager_ca_common_name: "POC DevOps Lab CA"
cert_manager_cluster_issuer_name: poc-lab-ca-issuer

wildcard_certificate_duration: 2160h
wildcard_certificate_renew_before: 360h
